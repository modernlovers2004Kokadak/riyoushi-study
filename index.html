<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>理容師国家試験対策</title>
  <meta name="theme-color" content="#07356f">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <button class="icon-btn" id="menuBtn" aria-label="メニュー">☰</button>
    <h1>理容師国家試験対策</h1>
    <button class="icon-btn" id="searchBtn" aria-label="検索">🔍</button>
  </div>
  <div class="search-bar" id="searchBar">
    <input id="searchInput" type="search" placeholder="条文・キーワードで検索">
  </div>
</header>

<main class="app">
  <section class="screen active" id="home">
    <section class="law-card">
      <div class="law-list" id="lawList"></div>
    </section>

    <section class="card progress-bottom">
      <h2>学習の進捗</h2>
      <div class="progress-content">
        <div class="donut" id="donut"><span id="percent">0%</span><small>全体の進捗</small></div>
        <dl>
          <dt>学習済み</dt><dd id="doneArticles">0 条文</dd>
          <dt>重要条文</dt><dd id="importantDone">0 / 0</dd>
          <dt>収録条文</dt><dd id="articleCount">0 条文</dd>
        </dl>
      </div>
    </section>
  </section>

  <section class="screen" id="laws">
    <div class="screen-title">
      <button class="back" data-nav="home">‹</button>
      <h2 id="lawScreenTitle">法令一覧</h2>
    </div>
    <p class="legend">★★★＝頻出　★★＝やや頻出　★＝基本</p>
    <div class="accordion" id="accordion"></div>
  </section>

  <section class="screen" id="detail">
    <div class="screen-title">
      <button class="back" data-nav="laws">‹</button>
      <h2 id="detailLawName"></h2>
    </div>

    <article class="article-card">
      <div class="article-head">
        <div>
          <p class="chapter" id="detailChapter"></p>
          <h2 id="detailTitle"></h2>
        </div>
        <div class="article-actions">
          <div class="stars" id="detailStars"></div>
          <button class="mark-btn" id="markDone">未学習</button>
        </div>
      </div>

      <section class="study-box">
        <span class="label blue">条文</span>
        <div id="detailBody"></div>
      </section>

      <section class="study-box">
        <span class="label green">試験ポイント</span>
        <ul id="detailPoints"></ul>
      </section>

      <div class="article-nav">
        <button id="prevArticle">‹ 前の条文</button>
        <button data-nav="laws">一覧に戻る</button>
        <button id="nextArticle">次の条文 ›</button>
      </div>
    </article>
  </section>

  <section class="screen" id="important">
    <div class="screen-title">
      <button class="back" data-nav="home">‹</button>
      <h2>重要条文</h2>
    </div>
    <div class="filter-pills">
      <button class="active" data-star="all">すべて</button>
      <button data-star="★★★">★★★</button>
      <button data-star="★★">★★</button>
      <button data-star="★">★</button>
      <button data-star="undone">未学習</button>
    </div>
    <div class="important-list" id="importantList"></div>
  </section>
</main>

<nav class="bottom-nav">
  <button class="active" data-nav="home">⌂<span>ホーム</span></button>
  <button data-nav="laws">☷<span>法令一覧</span></button>
  <button data-nav="important">☆<span>重要条文</span></button>
  <button data-nav="home">▮<span>進捗</span></button>
</nav>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
