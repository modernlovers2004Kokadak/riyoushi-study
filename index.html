:root{
  --bg:#fafafa;

*{box-sizing:border-box}
body{
  margin:0;
  background:#111;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",Meiryo,sans-serif;

.app{
  max-width:760px;
  margin:0 auto;
  min-height:100vh;
  background:#fff;
  box-shadow:0 8px 30px rgba(0,0,0,.18);
}
header{
  background:linear-gradient(135deg,var(--purple),var(--purple2));

  text-align:center;
  padding:26px 16px 28px;
}
h1{
  margin:0;
  font-size:clamp(1.65rem,5vw,2.15rem);
  font-weight:400;
  letter-spacing:.05em;
}
main{padding:22px 16px 34px}
.menu{display:grid;gap:16px}
.card{
  display:flex;
  align-items:center;
  justify-content:space-between;
  min-height:92px;
  padding:18px 20px;
  border-radius:18px;
  text-decoration:none;
  background:#fff;
  color:var(--ink);
  box-shadow:var(--shadow);
  border:2px solid #e8e1f8;
  font-weight:400;
  font-size:clamp(1.05rem,4.5vw,1.42rem);
  letter-spacing:.02em;
}
.card::after{
  content:'›';
  font-size:2.2rem;
  line-height:1;
  font-weight:400;
}
.card small{
  display:block;
  font-size:.82rem;
  color:var(--muted);
  font-weight:400;
  margin-top:2px;
}
.gold{border-color:#f3b83f;background:linear-gradient(180deg,#fffdf6,#fff)}
.gold,.gold::after{color:#a66c00}
.red{border-color:#f3a4a4;background:linear-gradient(180deg,#fff7f7,#fff)}
.red,.red::after{color:#c93a3a}
.green{border-color:#9bd9b7;background:linear-gradient(180deg,#f7fff9,#fff)}
.green,.green::after{color:#188a55}
.blue{border-color:#8bb8ff;background:linear-gradient(180deg,#f7fbff,#fff)}
.blue,.blue::after{color:#1d66d1}
.pink{border-color:#ff96bf;background:linear-gradient(180deg,#fff7fb,#fff)}
.pink,.pink::after{color:#d93673}
.gray{border-color:#d7dde6}
.gray,.gray::after{color:#303846}
.violet{border-color:#e2d6ff;background:linear-gradient(180deg,#fcfbff,#fff)}
.violet,.violet::after{color:#20242c}
.note{
  text-align:center;
  color:#667085;
  margin-top:26px;
  font-size:.95rem;
}
@media(max-width:520px){
  body{background:#fff}
  .app{box-shadow:none}
  main{padding:20px 12px 30px}
  .card{min-height:86px;padding:16px 18px;border-radius:16px}
}
