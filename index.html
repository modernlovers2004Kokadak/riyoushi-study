<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>理容師国家試験対策｜９法令</title>
<meta name="theme-color" content="#07356f">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <h1>理容師国家試験対策</h1>
    <button id="searchBtn" class="icon-btn" aria-label="検索">🔍</button>
  </div>
  <div class="search-bar" id="searchBar">
    <input id="searchInput" type="search" placeholder="９法令から検索">
  </div>
</header>

<main class="app">
  <section id="home" class="screen active">
    <section class="home-section">
      <h2>検索</h2>
      <input id="homeSearchInput" class="home-search" type="search" placeholder="例：免許、消毒、保健所、訪問販売">
    </section>

    <section class="home-section">
      <h2>法令一覧</h2>
      <div id="lawList" class="law-list"></div>
    </section>

    <section class="home-section card progress">
      <h2>学習の進捗</h2>
      <div class="progress-content">
        <div id="donut" class="donut"><span id="percent">0%</span><small>全体の進捗</small></div>
        <dl>
          <dt>学習済み条文</dt><dd id="doneCount">0 / 0</dd>
          <dt>重要条文</dt><dd id="importantDone">0 / 0</dd>
          <dt>学習済み法令</dt><dd id="doneLaws">0 / 9</dd>
        </dl>
      </div>
    </section>
  </section>

  <section id="lawScreen" class="screen">
    <div class="screen-title">
      <button class="back" id="backHome">‹</button>
      <h2 id="lawTitle"></h2>
    </div>
    <p class="legend">★★★＝頻出　★★＝やや頻出　★＝基本</p>
    <div id="articleList" class="article-list"></div>
  </section>

  <section id="searchScreen" class="screen">
    <div class="screen-title">
      <button class="back" id="backSearchHome">‹</button>
      <h2>検索結果</h2>
    </div>
    <div id="searchResults" class="article-list"></div>
  </section>
</main>

<section id="detail" class="detail hidden">
  <div class="detail-header">
    <button id="closeDetail">‹</button>
    <h2 id="detailTitle"></h2>
  </div>
  <article class="article-card">
    <div class="law-name" id="detailLaw"></div>
    <div class="article-top">
      <span id="detailStars" class="stars"></span>
      <button id="markDone" class="mark-btn">未学習</button>
    </div>
    <section class="study-box">
      <span class="label blue">条文</span>
      <div id="detailBody"></div>
    </section>
    <section class="study-box">
      <span class="label green">試験ポイント</span>
      <ul id="detailPoints"></ul>
    </section>
    <div class="article-nav">
      <button id="prevBtn">‹ 前</button>
      <button id="nextBtn">次 ›</button>
    </div>
  </article>
</section>

<script src="data.js"></script>
<script src="script.js"></script>
</body>
</html>
